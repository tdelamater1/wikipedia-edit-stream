spring.application.name=wikipedia-ingest

# --- Kafka consumer ---------------------------------------------------------
# Defaults target the EXTERNAL broker so the app can run from a laptop against
# the in-cluster Kafka (Strimzi external listener). Override in-cluster later.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:192.168.4.201:9094}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:wikipedia-ingest}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:latest}
# Producer sends plain JSON (no type headers) -> consume as String, parse with Jackson.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Topic the @KafkaListener subscribes to.
app.kafka.topic=${KAFKA_TOPIC:wikipedia-events}

# --- MongoDB ----------------------------------------------------------------
# NOTE: Spring Boot 4 renamed the Mongo CONNECTION properties from
# `spring.data.mongodb.*` to `spring.mongodb.*` (the old keys are deprecated and
# silently ignored -> connects to localhost with no auth). Repository settings
# like auto-index-creation stay under `spring.data.mongodb.*`.
#
# Discrete properties: Spring escapes the credentials, so you only supply the RAW
# password (MONGO_PASSWORD) — no percent-encoding needed. Local defaults assume
# `kubectl -n mongodb port-forward svc/mongodb-svc 27017:27017`.
spring.mongodb.host=${MONGO_HOST:localhost}
spring.mongodb.port=${MONGO_PORT:27017}
spring.mongodb.database=${MONGO_DB:wikipedia}
spring.mongodb.username=${MONGO_USERNAME:wikipedia}
spring.mongodb.password=${MONGO_PASSWORD:}
# The `wikipedia` user lives in the admin db (CR: db=admin), so auth there.
spring.mongodb.authentication-database=${MONGO_AUTH_DB:admin}
# We create indexes explicitly in MongoIndexInitializer, so keep auto-creation off.
spring.data.mongodb.auto-index-creation=false
# directConnection has no Spring property; MongoClientConfig forces SINGLE mode when
# true. Required for port-forwarded access (skips RS discovery of unreachable pod DNS).
# Set false in-cluster, where the replica-set member DNS resolves.
app.mongodb.direct-connection=${MONGO_DIRECT_CONNECTION:true}

# --- App tunables -----------------------------------------------------------
# TTL on the `edits` collection: 48h (172800s) so raw data never grows unbounded.
app.edits.ttl-seconds=${EDITS_TTL_SECONDS:172800}

# --- Actuator ---------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
# Expose liveness/readiness groups for k8s probes. Liveness = process is up;
# readiness includes the Mongo health check (won't take traffic until Mongo is reachable).
management.endpoint.health.probes.enabled=true
