spring.application.name=wikipedia-aggregation

# --- Kafka Streams ----------------------------------------------------------
# Default targets the EXTERNAL broker so it can run from a laptop; override in-cluster.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:192.168.4.201:9094}
spring.kafka.streams.application-id=${KAFKA_STREAMS_APP_ID:wikipedia-aggregation}
# RocksDB state lives here. In-cluster, back this with a volume (emptyDir is fine — state
# is rebuildable from the changelog topics).
spring.kafka.streams.state-dir=${KAFKA_STREAMS_STATE_DIR:/tmp/kafka-streams}
# Per-operator serdes are set explicitly; these defaults are just a safety net.
spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
# How often state flushes downstream + to changelog -> also caps the hot_topics write rate.
spring.kafka.streams.properties.commit.interval.ms=${STREAMS_COMMIT_INTERVAL_MS:5000}

app.kafka.topic=${KAFKA_TOPIC:wikipedia-events}

# --- Windowing (hopping) + top-N --------------------------------------------
app.window.size-minutes=${WINDOW_SIZE_MINUTES:10}
app.window.advance-minutes=${WINDOW_ADVANCE_MINUTES:1}
app.window.grace-minutes=${WINDOW_GRACE_MINUTES:2}
app.topn.size=${TOPN_SIZE:10}
# How many pages the single-key top-N task tracks internally (bounds state; >= topn.size).
app.topn.max-tracked=${TOPN_MAX_TRACKED:100}
# Only count edits to the main (article) namespace.
app.filter.main-namespace-only=${FILTER_MAIN_NAMESPACE_ONLY:true}

# --- Hotness scoring --------------------------------------------------------
# hotness = distinctEditors + edit-bonus(cap 2) + byte-bonus(cap 1), in "editor-units".
# Saturation = the value at which each sub-linear (ln) bonus reaches its cap:
#   edit-saturation = editCount that maxes the +2 edit-volume bonus
#   byte-saturation = |net bytes| that maxes the +1 byte-change bonus
app.hotness.edit-saturation=${HOTNESS_EDIT_SATURATION:10}
app.hotness.byte-saturation=${HOTNESS_BYTE_SATURATION:2000}

# --- MongoDB ----------------------------------------------------------------
# Boot 4 connection prefix is spring.mongodb.* (NOT spring.data.mongodb.*). Supply only the
# RAW password via MONGO_PASSWORD; Spring escapes it.
spring.mongodb.host=${MONGO_HOST:localhost}
spring.mongodb.port=${MONGO_PORT:27017}
spring.mongodb.database=${MONGO_DB:wikipedia}
spring.mongodb.username=${MONGO_USERNAME:wikipedia}
spring.mongodb.password=${MONGO_PASSWORD:}
spring.mongodb.authentication-database=${MONGO_AUTH_DB:admin}
spring.data.mongodb.auto-index-creation=false
# directConnection has no Spring property; forced via MongoClientConfig for port-forwarded
# (laptop) runs. Set false in-cluster.
app.mongodb.direct-connection=${MONGO_DIRECT_CONNECTION:true}

# --- Actuator + k8s probes --------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
